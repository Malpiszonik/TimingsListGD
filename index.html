<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD Timing List | Top Frame-Perfects</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #1c1c1c; 
            --card-bg: #252525; 
            --accent: #ffffff; 
            --text-dim: #b3b3b3; 
            --border: #333; 
            --yt-red: #ff0000;
            --nav-bg: #111;
        }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: "Segoe UI", Tahoma, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* Navigation Header */
        nav { 
            width: 100%; 
            background: var(--nav-bg); 
            padding: 15px 0; 
            border-bottom: 1px solid var(--border); 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .nav-title {
            font-weight: bold; 
            letter-spacing: 2px;
            font-size: 1.4rem;
            text-transform: uppercase;
        }
        .nav-buttons {
            display: flex;
            gap: 15px;
        }
        .nav-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 600;
            padding: 5px 10px;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .nav-link:hover {
            color: white;
            border-bottom: 1px solid white;
        }

        /* Main Layout */
        .main-container { 
            display: flex; 
            width: 95%; 
            max-width: 1200px; 
            margin-top: 30px; 
            gap: 25px; 
            padding-bottom: 50px;
        }
        .list-section { 
            flex: 2; 
            display: flex; 
            flex-direction: column; 
            gap: 3px; 
        }
        .level-item { 
            background: var(--card-bg); 
            padding: 12px 20px; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            transition: 0.15s ease-in-out; 
            border: 1px solid transparent; 
        }
        .level-item:hover { 
            background: #2e2e2e; 
            border-color: #555; 
        }
        .rank { 
            font-size: 1.6rem; 
            font-weight: 900; 
            min-width: 60px; 
            color: var(--text-dim); 
            font-style: italic;
        }
        .thumb { 
            width: 140px; 
            height: 78px; 
            background: #000; 
            margin-right: 20px; 
            border-radius: 3px; 
            object-fit: cover; 
            border: 1px solid #444;
        }
        .level-info b { font-size: 1.25rem; display: block; }
        .level-info span { color: var(--text-dim); font-size: 0.9rem; text-transform: uppercase; }

        /* Sidebar Panel */
        .info-panel { 
            flex: 1; 
            background: var(--card-bg); 
            padding: 30px; 
            height: fit-content; 
            position: sticky; 
            top: 20px; 
            border-radius: 4px; 
            border: 1px solid var(--border);
        }
        .info-panel h2 { margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 15px; font-size: 1.8rem; }
        .stats-row { margin: 12px 0; font-size: 1rem; }
        .stats-row b { color: var(--text-dim); margin-right: 5px; }
        
        .video-btn { 
            display: block; 
            margin-top: 20px; 
            padding: 12px; 
            background: var(--yt-red); 
            color: white; 
            text-decoration: none; 
            font-weight: bold; 
            text-align: center;
            border-radius: 4px; 
        }

        @media (max-width: 900px) { 
            .main-container { flex-direction: column-reverse; } 
            .info-panel { position: static; width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-title">GEOMETRY DASH TIMING LIST</div>
    <div class="nav-buttons">
        <a href="https://docs.google.com/document/d/e/2PACX-1vTNi_SkHKKUE5JN6a9a1X8TrutF3X_ua177ZlWYkGnkJXdCWfn0e-NAgYj6OQ70uKbfmExa6TbelHPK/pub?tab=t.0" target="_blank" class="nav-link">Rules</a>
        <a href="https://forms.gle/xf5gXQYXcccTi18c7" target="_blank" class="nav-link">Submit</a>
    </div>
</nav>

<div class="main-container">
    <div class="list-section" id="timing-list">
        <div style="padding: 20px; text-align: center;">Loading database...</div>
    </div>

    <div class="info-panel" id="info-panel">
        <p style="color: var(--text-dim);">Select a timing level from the list to view its details and verification video.</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAiTjdVFXD30yaaF1gr1JY5UVhoC87k__s",
        databaseURL: "https://gdtiminglist-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gdtiminglist",
        appId: "1:1040164485204:web:4a49db649a5146cdf4d5c1"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function getID(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length == 11) ? match[2] : 'dQw4w9WgXcQ';
    }

    function showDetails(l) {
        const panel = document.getElementById('info-panel');
        const videoId = getID(l.ytLink);
        panel.innerHTML = `
            <img src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg" style="width:100%; border-radius:4px; margin-bottom:20px; border: 1px solid #444;">
            <h2>#${l.pos} - ${l.name}</h2>
            <div class="stats-row"><b>Creator:</b> ${l.creator}</div>
            <div class="stats-row"><b>Level ID:</b> ${l.levelID || 'N/A'}</div>
            <a href="${l.ytLink}" target="_blank" class="video-btn">WATCH VERIFICATION</a>
        `;
    }

    db.ref('levels').orderByChild('pos').on('value', (snap) => {
        const container = document.getElementById('timing-list');
        container.innerHTML = '';
        
        if (!snap.exists()) {
            container.innerHTML = '<div style="padding:20px;">List is currently empty.</div>';
            return;
        }

        snap.forEach(child => {
            const l = child.val();
            if(!l.name) return;
            const videoId = getID(l.ytLink);
            
            const div = document.createElement('div');
            div.className = 'level-item';
            div.onclick = () => showDetails(l);
            div.innerHTML = `
                <div class="rank">#${l.pos}</div>
                <img class="thumb" src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg">
                <div class="level-info">
                    <b>${l.name}</b>
                    <span>by ${l.creator}</span>
                </div>
            `;
            container.appendChild(div);
        });
    });
</script>

</body>
</html>
